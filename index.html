<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Your Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    overflow: hidden;
    height: -webkit-fill-available;
    height: 100dvh;
  }

  body {
    width: 100%; height: 100%;
    height: -webkit-fill-available;
    overflow: hidden;
    touch-action: none;
    background: #0a0a0a;
    cursor: crosshair;
    font-family: 'DM Mono', monospace;
    color: #e8e4dc;
  }

  /* ── TILE LAYER ─────────────────────────────── */
  #grid {
    position: fixed;
    top: 0; left: 0;
    display: grid;
    gap: 3px;
    background: #0a0a0a;
    z-index: 0;
  }

  .tile {
    width: 52px; height: 52px;
    border-radius: 3px;
    will-change: transform;
    -webkit-transform: perspective(500px) translateZ(0px);
    transform:         perspective(500px) translateZ(0px);
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,0.07) 0px,
        rgba(255,255,255,0.07) 1px,
        #1a1a1a 1px);
  }

  /* ── VIGNETTE — darkens edges so content is readable ── */
  #vignette {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse 90% 85% at 50% 50%,
      transparent 20%,
      rgba(10,10,10,0.55) 60%,
      rgba(10,10,10,0.92) 100%);
    pointer-events: none;
  }

  /* ── UI LAYER ───────────────────────────────── */
  #ui {
    position: fixed; inset: 0; z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1.55fr;
    grid-template-rows: 1fr;
    padding: clamp(2rem, 4vw, 3.5rem);
    gap: clamp(2rem, 4vw, 4rem);
    pointer-events: none; /* let tile hover-events through by default */
  }

  #ui > * { pointer-events: auto; }

  /* ── LEFT — BIO ─────────────────────────────── */
  #bio {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .bio-label {
    font-size: .65rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #6b6b60;
    margin-bottom: 1.1rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4.5rem, 9vw, 8.5rem);
    line-height: .88;
    letter-spacing: .015em;
    color: #f0ece3;
    margin-bottom: 1.8rem;
  }

  h1 .outline {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1px #3a3a34;
  }

  .bio-text {
    font-size: clamp(.72rem, 1vw, .82rem);
    line-height: 1.85;
    color: #6b6b60;
    max-width: 32ch;
    margin-bottom: 2.2rem;
  }

  .bio-text em {
    font-style: normal;
    color: #c8c4ba;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem .9rem;
  }

  .links a {
    font-size: .65rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #6b6b60;
    text-decoration: none;
    padding-bottom: 1px;
    border-bottom: 1px solid #2e2e28;
    transition: color .2s, border-color .2s;
    cursor: pointer;
  }

  .links a:hover {
    color: #f0ece3;
    border-color: #f0ece3;
  }

  /* ── RIGHT — PROJECTS ───────────────────────── */
  #projects {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1.6rem;
  }

  .projects-header {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .projects-label {
    font-size: .65rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #6b6b60;
  }

  .projects-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1e1e1a;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(.8rem, 1.5vw, 1.4rem);
  }

  .card {
    position: relative;
    border: 1px solid #1e1e1a;
    border-radius: 4px;
    padding: clamp(1rem, 1.8vw, 1.4rem);
    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
    transition: border-color .25s, background .25s;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: .55rem;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.025) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }

  .card:hover {
    border-color: #3a3a34;
    background: rgba(18,18,15,0.75);
  }

  .card-num {
    font-size: .6rem;
    letter-spacing: .22em;
    color: #3a3a34;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 2.2vw, 1.8rem);
    letter-spacing: .04em;
    color: #f0ece3;
    line-height: 1;
  }

  .card-desc {
    font-size: clamp(.62rem, .85vw, .72rem);
    line-height: 1.7;
    color: #6b6b60;
    flex: 1;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin-top: auto;
  }

  .tag {
    font-size: .55rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: .22rem .55rem;
    border: 1px solid #1e1e1a;
    border-radius: 2px;
    color: #3a3a34;
    transition: color .2s, border-color .2s;
  }

  .card:hover .tag {
    color: #6b6b60;
    border-color: #2e2e28;
  }

  .card-arrow {
    position: absolute;
    top: clamp(.9rem, 1.5vw, 1.2rem);
    right: clamp(.9rem, 1.5vw, 1.2rem);
    font-size: .9rem;
    color: #2e2e28;
    transition: color .25s, transform .25s;
    line-height: 1;
  }

  .card:hover .card-arrow {
    color: #c8c4ba;
    transform: translate(2px, -2px);
  }

  /* ── MOBILE ─────────────────────────────────── */
  @media (max-width: 680px) {
    #ui {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      padding: 1.6rem 1.4rem;
      gap: 1.8rem;
    }

    h1 { font-size: clamp(3.5rem, 16vw, 5rem); margin-bottom: 1rem; }
    .bio-text { max-width: 100%; font-size: .72rem; margin-bottom: 1.4rem; }

    #bio { justify-content: flex-end; }
    #projects { justify-content: flex-start; }

    .grid { gap: .7rem; }
    .card { padding: .9rem; }
    .card-desc { display: none; } /* too cramped on small screens */
  }
</style>
</head>
<body>

<div id="grid"></div>
<div id="vignette"></div>

<div id="ui">

  <!-- LEFT: BIO -->
  <div id="bio">
    <p class="bio-label">Portfolio</p>
    <h1>Your<br><span class="outline">Nurbolot Altynbek uulu</span></h1>
    <p class="bio-text">
      <em>Designer &amp; developer</em> Graduated YZU Taiwan in 2026.
      I build interfaces that feel considered — systems that stay out of the way
      and <em>experiences people remember</em>.
    </p>
    <nav class="links">
      <a href="mailto:you@example.com">Email</a>
      <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
    </nav>
  </div>

  <!-- RIGHT: PROJECTS -->
  <div id="projects">
    <div class="projects-header">
      <span class="projects-label">Selected Work</span>
    </div>
    <div class="grid" id="project-grid"></div>
  </div>

</div>

<script>
/* ─────────────────────────────────────────────
   TILE BACKGROUND
───────────────────────────────────────────── */
const TILE_SIZE    = 52;
const GAP          = 3;
const STEP         = TILE_SIZE + GAP;
const HOVER_RADIUS = 200;
const MAX_LIFT     = 72;
const LERP         = 0.10;
const WAVE_SPEED   = 500;
const WAVE_WIDTH   = 70;
const WAVE_LIFT    = 32;
const WAVE_DECAY   = 2200;

const grid = document.getElementById('grid');
let cols = 0, rows = 0, tiles = [];
let mouseX = -99999, mouseY = -99999;
let waves = [];

function build() {
  const nc = Math.ceil((window.innerWidth  + 8) / STEP) + 1;
  const nr = Math.ceil((window.innerHeight + 8) / STEP) + 1;
  if (nc === cols && nr === rows) return;
  cols = nc; rows = nr;
  grid.style.width  = (nc * STEP) + 'px';
  grid.style.height = (nr * STEP) + 'px';
  grid.style.gridTemplateColumns = `repeat(${cols}, ${TILE_SIZE}px)`;
  grid.style.gridTemplateRows    = `repeat(${rows}, ${TILE_SIZE}px)`;
  grid.innerHTML = '';
  tiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = document.createElement('div');
      el.className = 'tile';
      grid.appendChild(el);
      tiles.push({ el,
        cx: c * STEP + TILE_SIZE / 2,
        cy: r * STEP + TILE_SIZE / 2,
        z: 0, targetZ: 0 });
    }
  }
}

function falloff(t) {
  t = Math.max(0, Math.min(1, t));
  return t * t * t * (t * (t * 6 - 15) + 10);
}

function tick(ts) {
  waves = waves.filter(w => (ts - w.t0) < WAVE_DECAY);
  for (let i = 0; i < tiles.length; i++) {
    const tile = tiles[i];
    const dx = mouseX - tile.cx, dy = mouseY - tile.cy;
    tile.targetZ = MAX_LIFT * falloff(1 - Math.sqrt(dx*dx + dy*dy) / HOVER_RADIUS);

    let waveZ = 0;
    for (let wi = 0; wi < waves.length; wi++) {
      const w   = waves[wi];
      const age = ts - w.t0;
      const wdx = tile.cx - w.x, wdy = tile.cy - w.y;
      const d   = Math.sqrt(wdx*wdx + wdy*wdy);
      const delta = d - age * WAVE_SPEED / 1000;
      if (Math.abs(delta) < WAVE_WIDTH / 2) {
        const pulse = Math.sin((1 - Math.abs(delta / (WAVE_WIDTH/2))) * Math.PI);
        waveZ += WAVE_LIFT * pulse * (1 - age / WAVE_DECAY);
      }
    }

    tile.z += (tile.targetZ - tile.z) * LERP;
    const z = tile.z + waveZ;

    if (Math.abs(z) > 0.08) {
      const tx = `perspective(500px) translateZ(${z.toFixed(2)}px)`;
      tile.el.style.webkitTransform = tx;
      tile.el.style.transform = tx;
      const sh = Math.min(z, 80);
      tile.el.style.boxShadow    = `0 ${(sh*.6).toFixed(1)}px ${(sh*1.3).toFixed(1)}px rgba(0,0,0,.85)`;
      const bw = Math.max(0.5, z * 0.07).toFixed(1);
      tile.el.style.borderBottom = `${bw}px solid #090909`;
      tile.el.style.borderRight  = `${bw}px solid #070707`;
    } else if (tile.z !== 0 || tile.el.style.transform !== '') {
      tile.z = 0;
      tile.el.style.cssText = '';
    }
  }
  requestAnimationFrame(tick);
}

function spawnWave(x, y) { waves.push({ x, y, t0: performance.now() }); }

window.addEventListener('mousemove',  e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseleave', () => { mouseX = -99999; mouseY = -99999; });
window.addEventListener('click',      e => spawnWave(e.clientX, e.clientY));
window.addEventListener('touchstart', e => {
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  spawnWave(t.clientX, t.clientY);
  mouseX = -99999; mouseY = -99999;
}, { passive: true });

let rt;
function onResize() {
  clearTimeout(rt);
  rt = setTimeout(() => { cols = 0; rows = 0; build(); }, 150);
}
window.addEventListener('resize', onResize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

build();
requestAnimationFrame(tick);

/* ─────────────────────────────────────────────
   PROJECTS  — edit this array
───────────────────────────────────────────── */
const projects = [
  {
    num: '01',
    title: 'Project Alpha',
    desc: 'A short line about what this does and why it matters.',
    tags: ['Design', 'React'],
    href: '#'
  },
  {
    num: '02',
    title: 'Project Beta',
    desc: 'Another project — the problem it solves, simply stated.',
    tags: ['Node.js', 'API'],
    href: '#'
  },
  {
    num: '03',
    title: 'Project Gamma',
    desc: 'Third entry. Tool, system, experiment — whatever it is.',
    tags: ['Python', 'ML'],
    href: '#'
  },
  {
    num: '04',
    title: 'Project Delta',
    desc: 'Fourth. Open source, side project, client work.',
    tags: ['Rust', 'CLI'],
    href: '#'
  },
];

const pg = document.getElementById('project-grid');
projects.forEach(p => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = p.href;
  a.target = '_blank';
  a.rel = 'noopener';
  a.innerHTML = `
    <span class="card-arrow">↗</span>
    <p class="card-num">${p.num}</p>
    <h2 class="card-title">${p.title}</h2>
    <p class="card-desc">${p.desc}</p>
    <div class="card-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  pg.appendChild(a);
});
</script>
</body>
</html>
